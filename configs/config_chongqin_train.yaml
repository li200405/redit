data:
    dataset: chongqing
    root: DATA/chongqin
    split: train
    channels: all
    filter_settings:
        type: cloud-free
        min_length: 10
        return_valid_obs_only: true
    crop_settings:
        enabled: false
        shape: ${tuple:64,64}
        type: random
    max_seq_length: 13
    norm: true
    rescale: true
    ifCTHW: false
    dates_file: dates.json
    cloudy_indices_file: low_clear_T_S2_CLEAR.json
    date_rescale: true
    return_dense_sar: true
    train_ratio: 0.9
    seed: 0

SDT:
    in_channels: 10
    input_size: 128
    patch_size: 4
    num_frames: 13
    cond_in_channels: 2
    landcover_router_enabled: true
    landcover_min_gate: 0.25
    landcover_built_temporal_gate: 0.35
    landcover_built_sar_gate: 1.00
    landcover_built_spatial_gate: 1.00
    landcover_crop_temporal_gate: 1.00
    landcover_crop_sar_gate: 0.60
    landcover_crop_spatial_gate: 0.70
    landcover_forest_temporal_gate: 0.65
    landcover_forest_sar_gate: 0.50
    landcover_forest_spatial_gate: 0.80
    landcover_other_temporal_gate: 0.55
    landcover_other_sar_gate: 0.70
    landcover_other_spatial_gate: 0.65
    dense_sar_temporal_scale_days: 18.0
    dense_sar_topk: 9
    vmamba_expansion: 1.5
    vmamba_date_scale_days: 45.0
    detail_hidden_channels: 64

landcover_loss:
    enabled: true
    building_edge_loss_w: 0.05

restoration_loss:
    reconstruction_type: charbonnier
    charbonnier_eps: 1.e-3
    spatial_gradient_loss_w: 0.08
    spectral_angle_loss_w: 0.03
    temporal_difference_loss_w: 0.08

training_settings:
    batch_size: 16

misc:
    num_workers: 8
    pin_memory: false

output:
    plot_model_txt: false
