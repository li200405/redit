data:
    dataset: chongqing
    root: DATA/chongqin
    split: train
    channels: all
    filter_settings:
        type: cloud-free
        min_length: 10
        return_valid_obs_only: true
    crop_settings:
        enabled: false
        shape: ${tuple:64,64}
        type: random
    max_seq_length: 13
    norm: true
    rescale: true
    ifCTHW: false
    dates_file: dates.json
    cloudy_indices_file: low_clear_T_S2_CLEAR.json
    date_rescale: true
    train_ratio: 0.9
    seed: 0

SDT:
    in_channels: 10
    input_size: 128
    patch_size: 8
    num_frames: 13
    cond_in_channels: 2

training_settings:
    batch_size: 16

misc:
    num_workers: 8
    pin_memory: false

output:
    plot_model_txt: false
