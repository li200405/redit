<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1280" viewBox="0 0 2400 1280">
  <defs>
    <linearGradient id="page" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#f7f9fc"/></linearGradient>
    <linearGradient id="backbone" x1="0" x2="1"><stop offset="0" stop-color="#eaf2ff"/><stop offset="1" stop-color="#dceafb"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#27364a" flood-opacity="0.11"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#34465d"/></marker>
    <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#3478b9"/></marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#33866d"/></marker>
    <marker id="purpleArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#7657aa"/></marker>
    <marker id="orangeArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#c47a32"/></marker>
    <style>
      text{font-family:"Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif;fill:#203047}
      .title{font-size:38px;font-weight:700;letter-spacing:1px}.subtitle{font-size:17px;fill:#64748b}
      .panel{font-size:24px;font-weight:700}.section{font-size:20px;font-weight:700}.head{font-size:18px;font-weight:700}
      .label{font-size:16px;font-weight:600}.small{font-size:14px;fill:#526174}.tiny{font-size:12px;fill:#6b7a8e}
      .box{stroke-width:2}.main{fill:none;stroke:#34465d;stroke-width:3.2;marker-end:url(#arrow)}
      .blue{fill:none;stroke:#3478b9;stroke-width:3;marker-end:url(#blueArrow)}
      .green{fill:none;stroke:#33866d;stroke-width:3;marker-end:url(#greenArrow)}
      .purple{fill:none;stroke:#7657aa;stroke-width:3;marker-end:url(#purpleArrow)}
      .orange{fill:none;stroke:#c47a32;stroke-width:3;marker-end:url(#orangeArrow)}
      .dash{stroke-dasharray:8 7}
    </style>
  </defs>

  <rect width="2400" height="1280" fill="url(#page)"/>
  <text x="1200" y="61" text-anchor="middle" class="title">REDiT：SAR 引导的时空 Transformer 扩散重建网络</text>
  <text x="1200" y="91" text-anchor="middle" class="subtitle">历史 Transformer 版本：多模态条件融合与 Sentinel-2 云遮挡重建</text>

  <!-- Overall architecture -->
  <rect x="45" y="118" width="2310" height="525" rx="22" fill="#ffffff" stroke="#ccd6e2" stroke-width="2"/>
  <text x="75" y="159" class="panel">(a) 整体架构</text>

  <text x="165" y="210" text-anchor="middle" class="section">多模态输入</text>
  <g filter="url(#shadow)">
    <rect x="75" y="235" width="220" height="88" rx="13" fill="#e8f2ff" stroke="#6d9fd1" class="box"/>
    <rect x="92" y="251" width="56" height="56" rx="6" fill="#3779bb"/>
    <path d="M99 297 L113 277 L126 290 L141 265" stroke="#fff" stroke-width="4" fill="none"/><circle cx="136" cy="260" r="6" fill="#f2cc7e"/>
    <text x="165" y="270" class="head">含云 S2 时序</text><text x="165" y="297" class="small">光学主输入</text>

    <rect x="75" y="341" width="220" height="88" rx="13" fill="#e7f6ee" stroke="#63a98d" class="box"/>
    <rect x="92" y="357" width="56" height="56" rx="6" fill="#33866d"/>
    <path d="M99 397 C111 369 126 369 141 397 M99 377 C111 406 127 406 141 377" stroke="#fff" stroke-width="3.4" fill="none"/>
    <text x="165" y="376" class="head">对齐 S1 SAR</text><text x="165" y="403" class="small">跨模态结构条件</text>

    <rect x="75" y="447" width="220" height="88" rx="13" fill="#f3eef9" stroke="#9a7bc2" class="box"/>
    <circle cx="120" cy="491" r="27" fill="#7657aa"/><path d="M120 472 V492 L135 500" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="165" y="482" class="head">辅助条件</text><text x="165" y="509" class="small">日期 · 稠密 SAR · 云掩膜</text>
  </g>

  <!-- Input construction and tokenization -->
  <g filter="url(#shadow)">
    <rect x="375" y="220" width="260" height="330" rx="17" fill="#f8fafc" stroke="#9daaba" class="box"/>
    <text x="505" y="258" text-anchor="middle" class="head">扩散输入与特征编码</text>
    <rect x="410" y="286" width="190" height="60" rx="9" fill="#fff2e5" stroke="#dc9a5b" stroke-width="1.5"/>
    <text x="505" y="311" text-anchor="middle" class="label">目标质量修正</text><text x="505" y="333" text-anchor="middle" class="tiny">训练阶段可靠监督</text>
    <rect x="410" y="365" width="190" height="60" rx="9" fill="#dcecff"/>
    <text x="505" y="390" text-anchor="middle" class="label">S2 / S1 分块编码</text><text x="505" y="412" text-anchor="middle" class="tiny">图像映射为特征序列</text>
    <rect x="410" y="444" width="190" height="60" rx="9" fill="#eee7f8"/>
    <text x="505" y="469" text-anchor="middle" class="label">日期与云掩膜编码</text><text x="505" y="491" text-anchor="middle" class="tiny">标记时间与可靠位置</text>
    <rect x="410" y="519" width="190" height="18" rx="7" fill="#e3f3eb"/>
  </g>

  <path d="M295 279 H345 V316 H410" class="blue"/>
  <path d="M505 346 V365" class="blue"/>
  <path d="M295 385 H410" class="green"/>
  <path d="M295 491 H410" class="purple"/>

  <!-- Transformer backbone -->
  <rect x="720" y="195" width="1010" height="390" rx="21" fill="url(#backbone)" stroke="#6e93bc" stroke-width="2.6"/>
  <text x="1225" y="235" text-anchor="middle" class="head">ConditionTS 时空 Transformer 主干</text>
  <text x="1660" y="235" text-anchor="middle" class="small">重复堆叠</text>

  <g filter="url(#shadow)">
    <rect x="765" y="285" width="205" height="135" rx="14" fill="#e3f3eb" stroke="#63a98d" class="box"/>
    <text x="867" y="321" text-anchor="middle" class="head">S1–S2 交叉注意力</text>
    <text x="867" y="352" text-anchor="middle" class="small">S2 作为查询</text><text x="867" y="378" text-anchor="middle" class="small">S1 作为键和值</text>

    <rect x="1005" y="285" width="205" height="135" rx="14" fill="#eee7f8" stroke="#9273bd" class="box"/>
    <text x="1107" y="321" text-anchor="middle" class="head">时间自注意力</text>
    <text x="1107" y="352" text-anchor="middle" class="small">固定空间位置</text><text x="1107" y="378" text-anchor="middle" class="small">跨日期读取参考</text>

    <rect x="1245" y="285" width="205" height="135" rx="14" fill="#e8f2ff" stroke="#6d9fd1" class="box"/>
    <text x="1347" y="321" text-anchor="middle" class="head">空间自注意力</text>
    <text x="1347" y="352" text-anchor="middle" class="small">固定观测日期</text><text x="1347" y="378" text-anchor="middle" class="small">建立空间依赖</text>

    <rect x="1485" y="285" width="195" height="135" rx="14" fill="#f4f6f8" stroke="#9aa8b8" class="box"/>
    <text x="1582" y="321" text-anchor="middle" class="head">条件前馈网络</text>
    <text x="1582" y="352" text-anchor="middle" class="small">AdaLN · MLP</text><text x="1582" y="378" text-anchor="middle" class="small">扩散步调制</text>
  </g>

  <path d="M635 352 H720 M970 352 H1005 M1210 352 H1245 M1450 352 H1485" class="main"/>
  <path d="M765 285 V263 H1680 V285" fill="none" stroke="#7b8ba0" stroke-width="2.2" stroke-dasharray="8 6" marker-end="url(#arrow)"/>
  <text x="1222" y="257" text-anchor="middle" class="tiny">块内残差路径</text>

  <!-- Auxiliary lanes and direct vertical ports -->
  <rect x="770" y="480" width="900" height="70" rx="13" fill="#ffffff" stroke="#b5c0cf" stroke-width="1.7"/>
  <rect x="795" y="499" width="145" height="32" rx="7" fill="#e3f3eb"/><text x="867" y="521" text-anchor="middle" class="tiny">对齐 SAR 条件</text>
  <rect x="1012" y="499" width="190" height="32" rx="7" fill="#eee7f8"/><text x="1107" y="521" text-anchor="middle" class="tiny">日期与稠密时间记忆</text>
  <rect x="1257" y="499" width="180" height="32" rx="7" fill="#fff3e7"/><text x="1347" y="521" text-anchor="middle" class="tiny">云可靠性与空间门控</text>
  <rect x="1507" y="499" width="150" height="32" rx="7" fill="#f3eef9"/><text x="1582" y="521" text-anchor="middle" class="tiny">扩散时间步</text>
  <path d="M867 499 V420" class="green"/>
  <path d="M1107 499 V420" class="purple"/>
  <path d="M1347 499 V420" class="orange dash"/>
  <path d="M1582 499 V420" class="purple dash"/>
  <path d="M635 474 H690 V515 H770" class="purple"/>

  <!-- Decoder and output -->
  <g filter="url(#shadow)">
    <rect x="1810" y="230" width="220" height="320" rx="18" fill="#f8fafc" stroke="#9aa8b8" class="box"/>
    <text x="1920" y="270" text-anchor="middle" class="head">重建解码</text>
    <rect x="1842" y="300" width="156" height="55" rx="9" fill="#e8eef6"/><text x="1920" y="334" text-anchor="middle" class="label">输出映射</text>
    <path d="M1920 355 V383" class="main"/>
    <rect x="1842" y="385" width="156" height="55" rx="9" fill="#e8eef6"/><text x="1920" y="419" text-anchor="middle" class="label">图像重组</text>
    <path d="M1920 440 V468" class="main"/>
    <rect x="1842" y="470" width="156" height="55" rx="9" fill="#ffe9e7" stroke="#d9877f" stroke-width="1.4"/><text x="1920" y="494" text-anchor="middle" class="label">细节恢复</text><text x="1920" y="515" text-anchor="middle" class="tiny">云区残差</text>

    <rect x="2110" y="250" width="180" height="280" rx="18" fill="#e4f7f2" stroke="#50a798" class="box"/>
    <text x="2200" y="290" text-anchor="middle" class="head">无云 S2 时序</text>
    <g transform="translate(2148 329)"><rect x="26" y="-14" width="105" height="94" rx="7" fill="#b6ddd1" stroke="#4f9e91" stroke-width="2"/><rect x="13" y="-7" width="105" height="94" rx="7" fill="#d0ebe3" stroke="#4f9e91" stroke-width="2"/><rect x="0" y="0" width="105" height="94" rx="7" fill="#6ba88a" stroke="#357a69" stroke-width="2.4"/><path d="M7 75 C25 48 40 64 55 36 C69 15 84 37 98 16" fill="none" stroke="#eef4d5" stroke-width="7"/><path d="M7 86 L31 60 L54 71 L75 44 L98 52" fill="none" stroke="#2d6f59" stroke-width="4"/></g>
    <text x="2200" y="465" text-anchor="middle" class="small">空间连续 · 时间一致</text><text x="2200" y="490" text-anchor="middle" class="small">多光谱重建结果</text>
  </g>
  <path d="M1730 352 H1810 M2030 390 H2110" class="main"/>

  <!-- Isolated diffusion loop -->
  <rect x="720" y="595" width="1570" height="32" rx="9" fill="#fafbfe" stroke="#d3dbe6" stroke-width="1"/>
  <text x="750" y="617" class="tiny">反向扩散：</text><text x="850" y="617" class="tiny">当前受损序列</text>
  <path d="M970 611 H1120" class="main"/><text x="1145" y="617" class="tiny">Transformer 预测</text>
  <path d="M1305 611 H1455" class="main"/><text x="1480" y="617" class="tiny">调度器更新</text>
  <path d="M1600 611 H1750" class="main"/><text x="1775" y="617" class="tiny">逐步恢复无云序列</text>

  <!-- Expanded transformer block -->
  <rect x="45" y="680" width="1570" height="540" rx="22" fill="#ffffff" stroke="#ccd6e2" stroke-width="2"/>
  <text x="75" y="722" class="panel">(b) ConditionTS Transformer 块</text>

  <rect x="80" y="755" width="1500" height="190" rx="17" fill="#f8fafc" stroke="#b6c1cf" stroke-width="1.8"/>
  <rect x="110" y="810" width="150" height="80" rx="11" fill="#e8f2ff" stroke="#7fa8cf" class="box"/><text x="185" y="843" text-anchor="middle" class="label">S2 Token</text><text x="185" y="869" text-anchor="middle" class="tiny">输入特征</text>
  <rect x="330" y="790" width="220" height="120" rx="13" fill="#e3f3eb" stroke="#63a98d" class="box"/><text x="440" y="831" text-anchor="middle" class="head">交叉注意力</text><text x="440" y="863" text-anchor="middle" class="small">S1–S2 对应融合</text>
  <rect x="620" y="790" width="220" height="120" rx="13" fill="#eee7f8" stroke="#9273bd" class="box"/><text x="730" y="831" text-anchor="middle" class="head">时间自注意力</text><text x="730" y="863" text-anchor="middle" class="small">跨日期参考</text>
  <rect x="910" y="790" width="220" height="120" rx="13" fill="#e8f2ff" stroke="#6d9fd1" class="box"/><text x="1020" y="831" text-anchor="middle" class="head">空间自注意力</text><text x="1020" y="863" text-anchor="middle" class="small">跨位置结构</text>
  <rect x="1200" y="810" width="180" height="80" rx="11" fill="#f3f5f8" stroke="#9aa8b8" class="box"/><text x="1290" y="843" text-anchor="middle" class="label">AdaLN · MLP</text><text x="1290" y="869" text-anchor="middle" class="tiny">条件前馈</text>
  <rect x="1445" y="810" width="100" height="80" rx="11" fill="#e4f7f2" stroke="#50a798" class="box"/><text x="1495" y="858" text-anchor="middle" class="label">输出</text>
  <path d="M260 850 H330 M550 850 H620 M840 850 H910 M1130 850 H1200 M1380 850 H1445" class="main"/>
  <path d="M185 810 V775 H1290 V810" fill="none" stroke="#7b8ba0" stroke-width="2.1" stroke-dasharray="7 6" marker-end="url(#arrow)"/>

  <!-- Attention interpretation -->
  <rect x="80" y="985" width="720" height="190" rx="16" fill="#faf8fd" stroke="#b5a1cf" stroke-width="1.8"/>
  <text x="440" y="1023" text-anchor="middle" class="head">时间注意力：同一空间位置跨日期建模</text>
  <g transform="translate(145 1060)"><rect x="0" y="0" width="66" height="58" rx="8" fill="#e2ebf7" stroke="#7d98b9" stroke-width="1.7"/><rect x="95" y="0" width="66" height="58" rx="8" fill="#d8e5f5" stroke="#7d98b9" stroke-width="1.7"/><rect x="190" y="0" width="66" height="58" rx="8" fill="#cedff2" stroke="#7d98b9" stroke-width="1.7"/><rect x="285" y="0" width="66" height="58" rx="8" fill="#c4d9ef" stroke="#7d98b9" stroke-width="1.7"/><rect x="380" y="0" width="66" height="58" rx="8" fill="#bad3ec" stroke="#7d98b9" stroke-width="1.7"/><path d="M10 70 H430" class="purple"/></g>
  <text x="440" y="1162" text-anchor="middle" class="tiny">利用相邻和远距离清晰日期补充云遮挡帧</text>

  <rect x="840" y="985" width="740" height="190" rx="16" fill="#f5f9ff" stroke="#8fb1d3" stroke-width="1.8"/>
  <text x="1210" y="1023" text-anchor="middle" class="head">空间注意力：同一日期跨位置建模</text>
  <g transform="translate(925 1050)"><rect x="0" y="0" width="250" height="100" rx="9" fill="#eaf3fc" stroke="#6d9fd1" stroke-width="1.8"/><g stroke="#c5d7e8" stroke-width="1"><path d="M50 0 V100 M100 0 V100 M150 0 V100 M200 0 V100"/><path d="M0 25 H250 M0 50 H250 M0 75 H250"/></g><circle cx="125" cy="50" r="11" fill="#3478b9"/><path d="M125 50 L28 18 M125 50 L220 22 M125 50 L38 82 M125 50 L222 80" stroke="#3478b9" stroke-width="2.5" marker-end="url(#blueArrow)"/></g>
  <text x="1345" y="1090" class="small">道路与建筑结构</text><text x="1345" y="1120" class="small">植被空间连续性</text><text x="1345" y="1150" class="tiny">建立全局空间依赖</text>

  <!-- Train/inference panel -->
  <rect x="1650" y="680" width="705" height="540" rx="22" fill="#ffffff" stroke="#ccd6e2" stroke-width="2"/>
  <text x="1680" y="722" class="panel">(c) 训练与重建</text>
  <rect x="1695" y="770" width="615" height="175" rx="16" fill="#fff8f1" stroke="#dfa16a" stroke-width="1.8"/>
  <text x="1730" y="807" class="head">训练阶段</text>
  <rect x="1735" y="840" width="130" height="55" rx="9" fill="#e8f2ff"/><text x="1800" y="874" text-anchor="middle" class="small">真实 S2</text>
  <rect x="1940" y="840" width="130" height="55" rx="9" fill="#fff0e1"/><text x="2005" y="874" text-anchor="middle" class="small">加噪与遮挡</text>
  <rect x="2145" y="840" width="125" height="55" rx="9" fill="#edf4fc"/><text x="2207" y="874" text-anchor="middle" class="small">预测监督</text>
  <path d="M1865 867 H1940 M2070 867 H2145" class="main"/>
  <text x="2002" y="924" text-anchor="middle" class="tiny">目标质量修正参与可靠监督构建</text>

  <rect x="1695" y="985" width="615" height="175" rx="16" fill="#f2faf7" stroke="#63a98d" stroke-width="1.8"/>
  <text x="1730" y="1022" class="head">推理阶段</text>
  <rect x="1735" y="1055" width="145" height="55" rx="9" fill="#e8f2ff"/><text x="1807" y="1089" text-anchor="middle" class="small">含云 S2 + S1</text>
  <rect x="1950" y="1055" width="145" height="55" rx="9" fill="#f3eef9"/><text x="2022" y="1089" text-anchor="middle" class="small">迭代反向扩散</text>
  <rect x="2165" y="1055" width="105" height="55" rx="9" fill="#e4f7f2"/><text x="2217" y="1089" text-anchor="middle" class="small">无云时序</text>
  <path d="M1880 1082 H1950 M2095 1082 H2165" class="main"/>
  <text x="2002" y="1139" text-anchor="middle" class="tiny">在每一步保留可见无云观测</text>

  <!-- Legend -->
  <rect x="1650" y="1240" width="705" height="27" rx="8" fill="#f8fafc" stroke="#d5dde7" stroke-width="1"/>
  <line x1="1680" y1="1253" x2="1730" y2="1253" stroke="#3478b9" stroke-width="4"/><text x="1740" y="1258" class="tiny">S2 主流</text>
  <line x1="1830" y1="1253" x2="1880" y2="1253" stroke="#33866d" stroke-width="4"/><text x="1890" y="1258" class="tiny">SAR 条件</text>
  <line x1="1990" y1="1253" x2="2040" y2="1253" stroke="#7657aa" stroke-width="4"/><text x="2050" y="1258" class="tiny">日期时间</text>
  <line x1="2150" y1="1253" x2="2200" y2="1253" stroke="#c47a32" stroke-width="4" stroke-dasharray="7 5"/><text x="2210" y="1258" class="tiny">可靠性</text>
</svg>
